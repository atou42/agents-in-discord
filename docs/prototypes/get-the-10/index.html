<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>get the 10</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand">
          <strong>get the 10</strong>
          <span id="stageLabel">第一轮 · 主方向</span>
        </div>
        <form class="intent-form" id="intentForm">
          <input id="intentInput" type="text" maxlength="60" placeholder="愤怒">
          <label class="ref-control" for="referenceInput">
            <input id="referenceInput" type="file" accept="image/*">
            <span id="referenceName">参考图</span>
          </label>
          <button type="submit" class="solid-button">生成</button>
        </form>
        <div class="top-actions">
          <button type="button" class="plain-button" id="zoomButton">放大</button>
          <button type="button" class="plain-button" id="resetButton">重置</button>
          <button type="button" class="plain-button" id="failToggleButton">模拟失败</button>
        </div>
      </header>

      <section class="status-strip" id="statusStrip">
        <span id="roundSummary">输入一个短意图开始</span>
        <span id="selectionSummary">主视觉未选择</span>
        <span id="packSummary">0 / 10</span>
        <button type="button" class="solid-button" id="nextButton" disabled>下一轮</button>
        <button type="button" class="solid-button" id="exportButton" hidden disabled>导出</button>
      </section>

      <section class="notice" id="notice" hidden></section>

      <section class="visual-grid" id="candidateGrid" aria-label="视觉候选"></section>
    </main>

    <section class="lightbox" id="lightbox" hidden aria-label="放大浏览">
      <div class="lightbox-chrome">
        <button type="button" class="plain-button" id="closeLightboxButton">关闭</button>
        <span id="lightboxCounter">1 / 27</span>
      </div>
      <button type="button" class="nav-hit left" id="prevButton" aria-label="上一张"></button>
      <div class="lightbox-track" id="lightboxTrack"></div>
      <button type="button" class="nav-hit right" id="nextImageButton" aria-label="下一张"></button>
    </section>

    <template id="candidateTemplate">
      <button class="visual-tile" type="button">
        <img alt="">
        <span class="tile-index"></span>
        <span class="tile-mark"></span>
      </button>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
